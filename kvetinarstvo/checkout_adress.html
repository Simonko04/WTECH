<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - kvetinarstvo.sk</title>
  
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap ikony -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
    <style>
        /* TODO ak bude moc css, presunut do style.css */
        .logo-placeholder {
            font-size: 1.8rem;
            font-weight: 900;
        }
    </style>
</head>
<body class="bg-white d-flex flex-column min-vh-100">

    <!-- HEADER (rovnaký ako na home page) -->
    <header class="border-bottom bg-white shadow-sm">
        <div class="container py-3">
           
            <!-- Horný riadok headeru: logo + názov (vľavo) + vyhľadávanie (na desktop) + ikony (vpravo) -->
            <div class="d-flex align-items-center">
              
                <!-- Logo + meno -->
                <a href="#" class="d-flex align-items-center text-decoration-none me-auto">
                    <span class="logo-placeholder text-danger">LOGO</span>
                    <span class="ms-3 fw-bold fs-4 text-dark">kvetinarstvo.sk</span>
                </a>
                <!-- Search - vedla loga - iba na desktop, skrity na mobile -->
                <form class="flex-grow-1 mx-4 d-none d-lg-flex">
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Search"
                               aria-label="Search">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
                <!-- menu ikony -->
                <div class="d-flex gap-4">
                    <a href="#" class="text-dark">
                        <i class="bi bi-heart fs-3"></i>
                    </a>
                    <a href="#" class="text-dark">
                        <i class="bi bi-person-circle fs-3"></i>
                    </a>
                    <a href="#" class="text-dark">
                        <i class="bi bi-cart fs-3"></i>
                    </a>
                </div>
            </div>
            <!-- MOBILE SEARCH - pod logom - iba na mobile -->
            <div class="mt-3 d-lg-none">
                <form>
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Search"
                               aria-label="Search">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT – checkout -->
    <main class="flex-grow-1 py-5">
        <div class="container">
            
            <h1 class="text-center mb-5 display-5 fw-bold">Checkout</h1>

            <div class="row g-5">

                <!-- BOX LEFT Billing Details  -->
                <div class="col-lg-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-body p-4">
                            <h4 class="mb-4">Billing Details</h4>
                            
                            <form>
                                <!-- First name + Last name -->
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">First name</label>
                                        <input type="text" class="form-control" placeholder="First name">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Last name</label>
                                        <input type="text" class="form-control" placeholder="Last name">
                                    </div>
                                </div>

                                <!-- Country -->
                                <div class="mb-3">
                                    <label class="form-label">Country</label>
                                    <input type="text" class="form-control" placeholder="Country">
                                </div>

                                <!-- Street address -->
                                <div class="mb-3">
                                    <label class="form-label">Street address</label>
                                    <input type="text" class="form-control" placeholder="Street address">
                                </div>

                                <!-- City + State / Province -->
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">City</label>
                                        <input type="text" class="form-control" placeholder="City">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">State / Province</label>
                                        <input type="text" class="form-control" placeholder="State / Province">
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- BOX RIGT: Your order -->
                <div class="col-lg-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-body p-4">
                            <h4 class="mb-4">Your order</h4>
                            
                            <div class="bg-light p-3 rounded mb-4">
                                <!-- Products -->
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Product 1</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Product 2</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span>Product 3</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                                
                                <hr>
                                
                                <!-- Shipping + Total -->
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="fw-medium">Shipping</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                                <div class="d-flex justify-content-between fs-5 fw-bold">
                                    <span>Total</span>
                                    <span>0.00$</span>
                                </div>
                            </div>

                            <button class="btn btn-dark w-100 py-3 fs-5 fw-bold">
                                Place order
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-light py-4 border-top">
        <div class="container text-center">
            <p class="mb-0 fw-medium">about us</p>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
