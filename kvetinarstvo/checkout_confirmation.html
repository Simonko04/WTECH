<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Confirmation - kvetinarstvo.sk</title>
 
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
 
    <style>
        .logo-placeholder {
            font-size: 1.8rem;
            font-weight: 900;
        }
        .success-box {
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            text-align: center;
        }
        .success-icon {
            width: 90px;
            height: 90px;
            margin-bottom: 1.5rem;
        }
        .return-btn {
            margin-top: 1.5rem;
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body class="bg-white d-flex flex-column min-vh-100">

    <!-- HEADER (unchanged from previous) -->
    <header class="border-bottom bg-white shadow-sm">
        <div class="container py-3">
            <div class="d-flex align-items-center">
                <a href="#" class="d-flex align-items-center text-decoration-none me-auto">
                    <span class="logo-placeholder text-danger">LOGO</span>
                    <span class="ms-3 fw-bold fs-4 text-dark">kvetinarstvo.sk</span>
                </a>
                <form class="flex-grow-1 mx-4 d-none d-lg-flex">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
                <div class="d-flex gap-4">
                    <a href="#" class="text-dark"><i class="bi bi-heart fs-3"></i></a>
                    <a href="#" class="text-dark"><i class="bi bi-person-circle fs-3"></i></a>
                    <a href="#" class="text-dark"><i class="bi bi-cart fs-3"></i></a>
                </div>
            </div>
            <div class="mt-3 d-lg-none">
                <form>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT – Checkout Confirmation -->
    <main class="flex-grow-1 py-5">
        <div class="container">
            <h1 class="text-center mb-5 display-5 fw-bold">Checkout</h1>

            <div class="row g-5 justify-content-center">
                <!-- LEFT – Order Confirmed -->
                <div class="col-lg-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-body p-4">
                            <h4 class="mb-4 text-center">Order Confirmed</h4>
                            
                            <div class="success-box mx-auto">
                               
                                <h5 class="fw-bold mb-3">Payment successful</h5>
                                
                                <div class="mb-2">
                                    <strong>Order id:</strong> 000000
                                </div>
                                <div class="mb-2">
                                    <strong>Order total:</strong> 0.00$
                                </div>
                                <div class="mb-3">
                                    <strong>Paid:</strong> 0.00$
                                </div>
                                
                                <button class="btn btn-dark return-btn">
                                    Return to main page
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- RIGHT – Your order (consistent with previous pages) -->
                <div class="col-lg-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-body p-4">
                            <h4 class="mb-4">Your order</h4>
                           
                            <div class="bg-light p-3 rounded mb-4">
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Product 1</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span>Product 2</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                                <div class="d-flex justify-content-between mb-3">
                                    <span>Product 2</span>
                                    <span class="text-muted">0.00$</span>
                                </div>
                               
                                <hr>
                               
                                <div class="d-flex justify-content-between mb-1">
                                    <span class="fw-medium">Shipping</span>
                                    <span class="text-muted">0.005$</span>
                                </div>
                                <div class="d-flex justify-content-between fs-5 fw-bold">
                                    <span>Total</span>
                                    <span>0.00$</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER (unchanged) -->
    <footer class="bg-light py-4 border-top">
        <div class="container text-center">
            <p class="mb-0 fw-medium">about us</p>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
