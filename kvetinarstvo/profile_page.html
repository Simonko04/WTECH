<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVETY - Profil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-accent: #d63384;
        }

        .logo-placeholder {
            font-size: 1.8rem;
            font-weight: 900;
        }

        .profile-avatar-frame {
            width: 10rem;
            height: 10rem;
        }

        .action-button {
            transition: background-color 0.2s, color 0.2s;
            cursor: pointer;
        }
        .action-button:hover {
            background-color: var(--primary-accent) !important;
            color: #fff !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-white">

<!-- HEADER - nemenený -->
<header class="border-bottom bg-white shadow-sm">
    <div class="container py-3">
        <div class="d-flex align-items-center">
            <a href="#" class="d-flex align-items-center text-decoration-none me-auto">
                <span class="logo-placeholder text-danger">LOGO</span>
                <span class="ms-3 fw-bold fs-4 text-dark">kvetinarstvo.sk</span>
            </a>
            <form class="flex-grow-1 mx-4 d-none d-lg-flex">
                <div class="input-group">
                    <input type="text"
                           class="form-control"
                           placeholder="Search"
                           aria-label="Search">
                    <button class="btn btn-outline-secondary" type="button">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
            <div class="d-flex gap-4">
                <a href="#" class="text-dark">
                    <i class="bi bi-heart fs-3"></i>
                </a>
                <a href="#" class="text-dark">
                    <i class="bi bi-person-circle fs-3"></i>
                </a>
                <a href="#" class="text-dark">
                    <i class="bi bi-cart fs-3"></i>
                </a>
            </div>
        </div>
        <div class="mt-3 d-lg-none">
            <form>
                <div class="input-group">
                    <input type="text"
                           class="form-control"
                           placeholder="Search"
                           aria-label="Search">
                    <button class="btn btn-outline-secondary" type="button">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</header>

<main class="container py-5 flex-grow-1">

    <!-- Breadcrumb - podľa wireframu -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a href="#" class="text-decoration-none text-muted">Home</a>
            </li>
            <li class="breadcrumb-item active text-muted" aria-current="page">Profile</li>
        </ol>
    </nav>

    <section class="row g-4 align-items-stretch" aria-label="Profil používateľa">

        <!-- Ľavý stĺpec: avatar, meno, status, akčné tlačidlá -->
        <div class="col-lg-5">
            <div class="bg-light p-5 rounded shadow-sm d-flex flex-column align-items-center text-center h-100">

                <!-- Avatar -->
                <figure class="mb-3">
                    <div class="profile-avatar-frame bg-white border border-secondary rounded-circle overflow-hidden d-flex align-items-center justify-content-center shadow-sm">
                        <img id="user-image"
                             src="img/profile.jpg"
                             alt="Profilová fotografia používateľa"
                             class="w-100 h-100 object-fit-cover">
                    </div>
                </figure>

                <!-- Meno -->
                <h1 id="user-display-name" class="fw-normal fs-4 mb-3">jozef mrkva</h1>

                <!-- Status -->
                <p>
                    <span id="user-status-label"
                          class="bg-secondary bg-opacity-25 px-4 py-1 rounded-pill small d-inline-block shadow-sm">
                        student
                    </span>
                </p>

                <!-- Akčné tlačidlá -->
                <div class="d-flex justify-content-center gap-3 mt-auto pt-3">
                    <button id="btn-history"
                            type="button"
                            class="action-button bg-secondary bg-opacity-25 border-0 px-4 py-2 rounded shadow-sm text-dark">
                        order history
                    </button>
                    <button id="btn-wishlist"
                            type="button"
                            class="action-button bg-secondary bg-opacity-25 border-0 px-4 py-2 rounded shadow-sm text-dark">
                        wishlist
                    </button>
                </div>

            </div>
        </div>

        <!-- Pravý stĺpec: kontaktné informácie -->
        <div class="col-lg-7">
            <div class="bg-light p-5 rounded shadow-sm h-100 d-flex flex-column">

                <h2 class="h5 mb-4 pb-2 border-bottom text-dark">Contact Information</h2>

                <dl class="d-flex flex-column gap-3 fs-6 mb-5">

                    <div class="d-flex flex-sm-row flex-column justify-content-between">
                        <dt class="fw-normal text-muted">E-mail:</dt>
                        <dd class="fw-medium text-dark mb-0" id="user-email">
                            jozef.mrkva@student.stuba.sk
                        </dd>
                    </div>

                    <div class="d-flex flex-sm-row flex-column justify-content-between">
                        <dt class="fw-normal text-muted">Phone:</dt>
                        <dd class="fw-medium text-dark mb-0" id="user-phone">
                            +421 912 345 678
                        </dd>
                    </div>

                    <div class="d-flex flex-sm-row flex-column justify-content-between">
                        <dt class="fw-normal text-muted">Address:</dt>
                        <dd class="fw-medium text-dark text-sm-end mb-0" id="user-address">
                            Ilkovičova 2<br>841 04 Bratislava
                        </dd>
                    </div>

                    <div class="d-flex flex-sm-row flex-column justify-content-between">
                        <dt class="fw-normal text-muted">Member since:</dt>
                        <dd class="fw-medium text-dark mb-0">
                            <time id="user-reg-date" datetime="2025-09">September 2025</time>
                        </dd>
                    </div>

                </dl>

                <div class="mt-auto text-center">
                    <button id="edit_profile"
                            type="button"
                            class="action-button bg-secondary bg-opacity-25 border-0 px-5 py-2 rounded shadow-sm text-dark">
                        change info
                    </button>
                </div>

            </div>
        </div>

    </section>

</main>

<!-- FOOTER - nemenený -->
<footer class="bg-light py-4 border-top">
    <div class="container text-center">
        <p class="mb-0 fw-medium">about us</p>
    </div>
</footer>

</body>
</html>
