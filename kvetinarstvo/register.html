<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrácia - kvetinarstvo.sk</title>
 
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap ikony -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
 
    <style>
        /* same styles as login page */
        .logo-placeholder { font-size: 1.8rem; font-weight: 900; }
        .auth-card {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .auth-body {
            padding: 2.5rem 2rem;
        }
        .btn-primary-custom {
            background-color: #e91e63;
            border: none;
            font-weight: 500;
            padding: 0.85rem;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: background-color 0.2s;
        }
        .btn-primary-custom:hover {
            background-color: #c2185b;
        }
        .form-control-lg::placeholder {
            color: #aaa;
        }
        .btn-verify {
            background-color: #6c757d;
            color: white;
            font-size: 0.95rem;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
        }
        .switch-link {
            color: #e91e63;
            font-weight: 500;
            text-decoration: none;
        }
        .switch-link:hover { text-decoration: underline; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <!-- HEADER -->
    <header class="border-bottom bg-white shadow-sm">
        <div class="container py-3">
            
            <!-- Horny riadok headeru: logo + nazov (vlavo) + vyhladavanie (na desktop) + ikony (vpravo) -->
            <div class="d-flex align-items-center">
               
                <!-- Logo + meno -->
                <a href="#" class="d-flex align-items-center text-decoration-none me-auto">
                    <span class="logo-placeholder text-danger">LOGO</span>
                    <span class="ms-3 fw-bold fs-4 text-dark">kvetinarstvo.sk</span>
                </a>
                <!-- Search - vedla loga - iba na desktop, skrity na mobile) -->
                <form class="flex-grow-1 mx-4 d-none d-lg-flex">
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Search"
                               aria-label="Search">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
                <!-- menu ikony -->
                <div class="d-flex gap-4">
                    <a href="#" class="text-dark">
                        <i class="bi bi-heart fs-3"></i>
                    </a>
                    <a href="#" class="text-dark">
                        <i class="bi bi-person-circle fs-3"></i>
                    </a>
                    <a href="#" class="text-dark">
                        <i class="bi bi-cart fs-3"></i>
                    </a>
                </div>
            </div>
            <!-- MOBILE SEARCH - pod logom - iba na mobile, skrity na desktop -->
            <div class="mt-3 d-lg-none">
                <form>
                    <div class="input-group">
                        <input type="text"
                               class="form-control"
                               placeholder="Search"
                               aria-label="Search">
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </header>

    <!-- BODY – Register -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="auth-card">
                <div class="auth-body">
                    <h4 class="text-center mb-4 fw-bold">Zaregistrovať sa</h4>
                    
                    <form>
                        <div class="mb-3">
                            <input type="text" class="form-control form-control-lg" placeholder="Meno">
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control form-control-lg" placeholder="Email">
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control form-control-lg" placeholder="Heslo">
                        </div>
                        
                        <div class="input-group mb-4">
                            <input type="text" class="form-control form-control-lg" placeholder="Potvrdzovací kód">
                            <button class="btn btn-verify" type="button">Odoslať</button>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom text-white w-100">
                            Vytvoriť účet
                        </button>

                        <div class="text-center mt-4 pt-3 border-top">
                            Máš už účet? 
                            <a href="login.html" class="switch-link">Prihlásiť sa</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto">
        <div class="container text-center">
            <p class="mb-0 fw-medium text-muted">about us</p>
        </div>
    </footer>
	<!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
