<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KVETY - Košík</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-accent: #d63384;
    }

    .logo-placeholder {
      font-size: 1.8rem;
      font-weight: 900;
    }

    .quantity-display::-webkit-outer-spin-button,
    .quantity-display::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .quantity-display {
      -moz-appearance: textfield;
      width: 2.5rem;
      height: 2.5rem;
    }

    .cursor-pointer { cursor: pointer; }

    .cart-item {
      transition: background-color 0.2s;
    }
    .cart-item:hover {
      background-color: #f8f9fa;
    }

    .product-link {
      transition: color 0.2s;
    }
    .product-link:hover {
      color: var(--primary-accent) !important;
    }

    .btn-continue {
      transition: background-color 0.2s, color 0.2s;
    }
    .btn-continue:hover {
      background-color: var(--primary-accent) !important;
      color: #fff !important;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-white">

<!-- HEADER - nemenený -->
<header class="border-bottom bg-white shadow-sm">
  <div class="container py-3">
    <div class="d-flex align-items-center">
      <a href="#" class="d-flex align-items-center text-decoration-none me-auto">
        <span class="logo-placeholder text-danger">LOGO</span>
        <span class="ms-3 fw-bold fs-4 text-dark">kvetinarstvo.sk</span>
      </a>
      <form class="flex-grow-1 mx-4 d-none d-lg-flex">
        <div class="input-group">
          <input type="text"
                 class="form-control"
                 placeholder="Search"
                 aria-label="Search">
          <button class="btn btn-outline-secondary" type="button">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>
      <div class="d-flex gap-4">
        <a href="#" class="text-dark"><i class="bi bi-heart fs-3"></i></a>
        <a href="#" class="text-dark"><i class="bi bi-person-circle fs-3"></i></a>
        <a href="#" class="text-dark"><i class="bi bi-cart fs-3"></i></a>
      </div>
    </div>
    <div class="mt-3 d-lg-none">
      <form>
        <div class="input-group">
          <input type="text"
                 class="form-control"
                 placeholder="Search"
                 aria-label="Search">
          <button class="btn btn-outline-secondary" type="button">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </form>
    </div>
  </div>
</header>

<main class="container py-5 flex-grow-1">

  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a href="#" class="text-decoration-none text-muted">Home</a>
      </li>
      <li class="breadcrumb-item active text-muted" aria-current="page">Košík</li>
    </ol>
  </nav>

  <section aria-label="Nákupný košík">
    <ul class="list-unstyled d-flex flex-column gap-3 mb-4 w-100">

      <!-- Produkt 1 -->
      <li class="cart-item bg-light rounded shadow-sm px-3 py-3 w-100">
        <div class="d-flex align-items-center gap-3">
          <a href="single-product.html"
             class="product-link bg-secondary bg-opacity-25 px-4 py-2 small flex-grow-1 d-flex align-items-center text-truncate text-dark text-decoration-none">
            Ruža červená – 1 ks
          </a>
          <div class="d-flex align-items-center gap-2 flex-shrink-0">
                        <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                              aria-label="Znížiť množstvo">—</span>
            <input type="number"
                   class="quantity-display bg-secondary bg-opacity-25 border-0 rounded-circle text-center fw-bold shadow-sm"
                   value="2" min="1" aria-label="Množstvo">
            <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                  aria-label="Zvýšiť množstvo">+</span>
          </div>
          <span class="bg-secondary bg-opacity-25 px-3 py-2 small shadow-sm flex-shrink-0 text-end"
                style="min-width: 5rem;">
                        5.00€
                    </span>
        </div>
      </li>

      <!-- Produkt 2 -->
      <li class="cart-item bg-light rounded shadow-sm px-3 py-3 w-100">
        <div class="d-flex align-items-center gap-3">
          <a href="single-product.html"
             class="product-link bg-secondary bg-opacity-25 px-4 py-2 small flex-grow-1 d-flex align-items-center text-truncate text-dark text-decoration-none">
            Orchidea fialová – kvetináč
          </a>
          <div class="d-flex align-items-center gap-2 flex-shrink-0">
                        <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                              aria-label="Znížiť množstvo">—</span>
            <input type="number"
                   class="quantity-display bg-secondary bg-opacity-25 border-0 rounded-circle text-center fw-bold shadow-sm"
                   value="1" min="1" aria-label="Množstvo">
            <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                  aria-label="Zvýšiť množstvo">+</span>
          </div>
          <span class="bg-secondary bg-opacity-25 px-3 py-2 small shadow-sm flex-shrink-0 text-end"
                style="min-width: 5rem;">
                        14.99€
                    </span>
        </div>
      </li>

      <!-- Produkt 3 -->
      <li class="cart-item bg-light rounded shadow-sm px-3 py-3 w-100">
        <div class="d-flex align-items-center gap-3">
          <a href="single-product.html"
             class="product-link bg-secondary bg-opacity-25 px-4 py-2 small flex-grow-1 d-flex align-items-center text-truncate text-dark text-decoration-none">
            Karafiát biely – kytica
          </a>
          <div class="d-flex align-items-center gap-2 flex-shrink-0">
                        <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                              aria-label="Znížiť množstvo">—</span>
            <input type="number"
                   class="quantity-display bg-secondary bg-opacity-25 border-0 rounded-circle text-center fw-bold shadow-sm"
                   value="3" min="1" aria-label="Množstvo">
            <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                  aria-label="Zvýšiť množstvo">+</span>
          </div>
          <span class="bg-secondary bg-opacity-25 px-3 py-2 small shadow-sm flex-shrink-0 text-end"
                style="min-width: 5rem;">
                        26.70€
                    </span>
        </div>
      </li>

      <!-- Produkt 4 -->
      <li class="cart-item bg-light rounded shadow-sm px-3 py-3 w-100">
        <div class="d-flex align-items-center gap-3">
          <a href="single-product.html"
             class="product-link bg-secondary bg-opacity-25 px-4 py-2 small flex-grow-1 d-flex align-items-center text-truncate text-dark text-decoration-none">
            Slnečnica žltá – 3 ks
          </a>
          <div class="d-flex align-items-center gap-2 flex-shrink-0">
                        <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                              aria-label="Znížiť množstvo">—</span>
            <input type="number"
                   class="quantity-display bg-secondary bg-opacity-25 border-0 rounded-circle text-center fw-bold shadow-sm"
                   value="1" min="1" aria-label="Množstvo">
            <span class="fs-5 fw-bold text-dark user-select-none cursor-pointer"
                  aria-label="Zvýšiť množstvo">+</span>
          </div>
          <span class="bg-secondary bg-opacity-25 px-3 py-2 small shadow-sm flex-shrink-0 text-end"
                style="min-width: 5rem;">
                        5.20€
                    </span>
        </div>
      </li>

    </ul>

    <!-- Suma + pokračovať -->
    <div class="d-flex justify-content-end">
      <div class="d-flex flex-column align-items-end gap-2">
        <div class="bg-secondary bg-opacity-25 px-4 py-2 small shadow-sm fw-medium">
          Suma: <strong>51.89€</strong>
        </div>
        <button type="button"
                class="btn-continue bg-secondary bg-opacity-25 border-0 px-5 py-2 rounded shadow-sm text-dark small">
          pokračovať
        </button>
      </div>
    </div>

  </section>

</main>

<!-- FOOTER - nemenený -->
<footer class="bg-light py-4 border-top">
  <div class="container text-center">
    <p class="mb-0 fw-medium">about us</p>
  </div>
</footer>

</body>
</html>
