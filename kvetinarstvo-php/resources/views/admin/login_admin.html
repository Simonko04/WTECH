<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prihlásenie - kvetinarstvo.sk</title>
	
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap ikony -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
   
    <style>
        .logo-placeholder {
            font-size: 1.8rem;
            font-weight: 900;
        }
        .auth-card {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            overflow: hidden;
        }
		.auth-header {
            background: #1a1a1a;
            color: white;
            padding: 1.8rem 2rem;
            text-align: center;
        }
        .auth-body {
            padding: 2.5rem 2rem;
        }
		.btn-admin {
            background-color: #1a1a1a;
            border: none;
            font-weight: 600;
            padding: 0.9rem;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .btn-admin:hover {
            background-color: #333;
            transform: translateY(-1px);
        }
        .form-control-lg::placeholder {
            color: #aaa;
        }
        .switch-link {
            color: #e91e63;
            font-weight: 500;
            text-decoration: none;
        }
        .switch-link:hover {
            text-decoration: underline;
        }
		.admin-header {
            background-color: #1a1a1a;
            color: white;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <!-- HEADER - ADMIN -->
    <header class="border-bottom admin-header shadow-sm">
        <div class="container py-3">
           
            <!-- Horný riadok headeru: logo + názov (vľavo) + vyhľadávanie (na desktop) + ikony (vpravo) -->
            <div class="d-flex align-items-center">
              
                <!-- Logo + Admin title -->
                <a href="Home_page.html" class="d-flex align-items-center text-decoration-none text-white me-auto">
                    <span class="logo-placeholder text-danger">LOGO</span>
                    <span class="ms-3 fw-bold fs-4">kvetinarstvo.sk</span>
                    <span class="ms-3 badge bg-danger fs-6">ADMIN</span>
                </a>
            </div>
        </div>
    </header>

	<!-- BODY – Admin Login -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="auth-card">
                
                <div class="auth-header">
                    <i class="bi bi-shield-lock fs-1 mb-3"></i>
                    <h4 class="mb-1 fw-bold">Administrácia</h4>
                    <p class="mb-0 opacity-75">Prihlásenie do administračného rozhrania</p>
                </div>

                <div class="auth-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label fw-medium text-muted small">Email</label>
                            <input type="text" class="form-control form-control-lg" placeholder="admin@kvetinarstvo.sk" autocomplete="username">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-medium text-muted small">Heslo</label>
                            <input type="password" class="form-control form-control-lg" placeholder="••••••••" autocomplete="current-password">
                        </div>
                       
                        <button type="submit" class="btn btn-admin text-white w-100 mb-3">
                            Prihlásiť sa ako administrátor
                        </button>

                        <div class="text-center mt-4 pt-3 border-top">
                            <a href="Home_page.html" class="text-muted small">
                                ← Späť na zákaznícku stránku
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

	<!-- FOOTER -->
    <footer class="bg-white py-4 border-top mt-auto">
        <div class="container">
            <div class="text-center small text-muted">
                Kvetinárstvo.sk • Administrátorské rozhranie • Demo 2026
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
